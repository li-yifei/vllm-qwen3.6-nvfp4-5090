# docker-compose.huihui-gemma4-nvfp4.yml
# Serves the locally-quantized Huihui-gemma-4-31B-it-abliterated NVFP4 checkpoint
# (produced by ~/gemma4-modelopt-nvfp4/01_quantize.py) on RTX 5090.
#
# Uses the gemma4-cu130 image already pulled locally — that build has the
# Gemma4ForConditionalGeneration model implementation and compressed-tensors
# NVFP4 loader. Launch with:
#   docker compose --env-file .env.huihui-gemma4-nvfp4 -f docker-compose.huihui-gemma4-nvfp4.yml up -d
services:
  vllm:
    image: vllm/vllm-openai:gemma4-cu130
    container_name: ${CONTAINER_NAME:-huihui-gemma4-nvfp4}
    restart: unless-stopped
    network_mode: host
    ipc: host
    devices:
      - nvidia.com/gpu=all
    volumes:
      - ${HF_CACHE}:/root/.cache/huggingface
      - ${VLLM_CACHE}:/root/.cache/vllm
      - ${LOCAL_MODEL_DIR}:/models/huihui-gemma4-nvfp4:ro
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - VLLM_USE_FLASHINFER_MOE_FP4=0
      - VLLM_NVFP4_GEMM_BACKEND=${NVFP4_BACKEND:-marlin}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    command:
      - "/models/huihui-gemma4-nvfp4"
      - "--host=0.0.0.0"
      - "--port=${PORT:-8000}"
      - "--served-model-name=${SERVED_MODEL_NAME:-huihui-gemma4-31b-nvfp4}"
      - "--max-model-len=${MAX_MODEL_LEN:-32768}"
      - "--gpu-memory-utilization=${GPU_MEMORY_UTILIZATION:-0.9}"
      - "--max-num-seqs=${MAX_NUM_SEQS:-4}"
      - "--max-num-batched-tokens=${MAX_NUM_BATCHED_TOKENS:-4096}"
      - "--kv-cache-dtype=${KV_CACHE_DTYPE:-fp8}"
      - "--trust-remote-code"
      - "--enable-prefix-caching"
      - "--enable-auto-tool-choice"
      - "--tool-call-parser=gemma4"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 600s
